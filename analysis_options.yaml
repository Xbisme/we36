include: package:very_good_analysis/analysis_options.yaml

analyzer:
  language:
    strict-casts: true
    strict-raw-types: true
    strict-inference: true
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/*.config.dart"
    - "lib/l10n/generated/**"
  errors:
    # No raw print/debugPrint anywhere (Constitution: AppLogger only).
    avoid_print: error

linter:
  rules:
    public_member_api_docs: false # internal app, not a published package
    lines_longer_than_80_chars: false # Flutter widget trees read better unwrapped
    flutter_style_todos: false
