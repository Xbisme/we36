name: we36
description: "We36 — Instagram-style social app (foundation: design system + navigation)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Networking (#002)
  dio: ^5.10.0
  socket_io_client: ^3.1.6 # Socket.IO-compatible — matches the backend Socket.IO gateway

  # Local cache / persistence (#002)
  drift: ^2.34.0
  drift_flutter: ^0.3.0
  flutter_secure_storage: ^10.3.1 # token store seam (impl in #003)

  # Ids (UUIDv7 — matches backend id scheme)
  uuid: ^4.5.3

  # State management
  flutter_bloc: ^9.1.1

  # Dependency injection
  get_it: ^9.2.1
  injectable: ^3.0.0

  # Routing
  go_router: ^17.3.0

  # Codegen annotations
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0

  # Icons (single Lucide family)
  lucide_icons_flutter: ^3.1.14

  # Media display (used by PostCard; #001 feeds it fake/asset providers — no network)
  cached_network_image: ^3.4.1

  # i18n / formatting
  intl: ^0.20.2 # pinned by flutter_localizations from the SDK

  cupertino_icons: ^1.0.8

  # Auth & onboarding (#003)
  google_sign_in: ^7.2.0 # v7 singleton API: GoogleSignIn.instance + authenticate()
  sign_in_with_apple: ^8.1.0
  shared_preferences: ^2.5.5 # non-secret local flags (onboardingSeen, profileCompleted)

  # Create Post — compose & upload (#007)
  photo_manager: ^3.9.0 # custom in-app gallery grid (device albums/assets, no OS picker UI)
  photo_manager_image_provider: ^2.2.0 # bounded-resolution asset thumbnails for the grid
  crop_your_image: ^2.0.0 # pure-Flutter 4:5 crop with custom chrome
  image: ^4.9.1 # pure-Dart bake color-matrix + resize/encode on isolate (also upload compress)

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Codegen
  build_runner: ^2.15.0
  freezed: ^3.2.5
  json_serializable: ^6.14.0
  drift_dev: ^2.34.0
  injectable_generator: ^3.0.2 # 3.1.0 requires Dart >=3.12; pinned for the installed 3.11.5 toolchain

  # Lint
  very_good_analysis: ^10.2.0
  bloc_lint: ^0.4.1

  # Test
  bloc_test: ^10.0.0
  mocktail: ^1.0.5

flutter:
  uses-material-design: true
  generate: true # enable gen-l10n

  assets:
    - assets/brand/

  # Bundled variable fonts (offline + golden-deterministic; fontWeight drives the wght axis).
  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans.ttf
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter.ttf
